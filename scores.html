<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dove Cup 积分榜</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--green:#07C160;--green-dark:#059A4A;--green-light:#E8F9EF;--blue:#10AEFF;--blue-light:#EBF8FF;--orange:#FF8C00;--orange-light:#FFF3E0;--red:#FA5151;--gray-50:#FAFAFA;--gray-100:#F7F7F7;--gray-200:#EFEFEF;--gray-300:#DCDCDC;--gray-500:#999;--gray-700:#555;--ink:#1A1A1A;--white:#fff;--shadow:0 8px 28px rgba(0,0,0,.08);--shadow-soft:0 2px 12px rgba(0,0,0,.06)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}body{font-family:'Noto Sans SC',-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--gray-100);color:var(--ink);min-height:100dvh;padding:18px}.page{max-width:1080px;margin:0 auto}.hero{background:linear-gradient(135deg,#111827 0%,#0F9F57 78%);color:#fff;border-radius:24px;padding:24px;box-shadow:0 16px 44px rgba(17,24,39,.2);margin-bottom:16px}.hero-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap}h1{font-size:clamp(28px,4vw,44px);line-height:1.1;font-weight:900}.subtitle{margin-top:10px;font-size:14px;opacity:.9;line-height:1.6}.status-pill{background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.3);border-radius:999px;padding:8px 13px;font-size:13px;font-weight:800}.actions,.admin-grid,.form-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.actions{margin-top:22px}.admin-control{display:none}body.is-admin .admin-control{display:flex}.btn{font-family:inherit;border:0;cursor:pointer;border-radius:999px;padding:11px 16px;font-size:14px;font-weight:900;background:#fff;color:var(--green-dark);box-shadow:0 4px 16px rgba(0,0,0,.1);transition:transform .12s ease}.btn.secondary{color:#fff;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.34);box-shadow:none}.btn:active{transform:scale(.97)}.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:16px}.stat-card{background:#fff;border-radius:18px;padding:16px;box-shadow:var(--shadow-soft)}.stat-card .num{font-size:28px;font-weight:900;color:var(--green)}.stat-card .label{color:var(--gray-500);font-size:12px;margin-top:4px;font-weight:700}.panel{background:#fff;border-radius:20px;padding:16px;box-shadow:var(--shadow);margin-bottom:16px}.panel-title{font-size:15px;font-weight:900;margin-bottom:12px}.admin-grid{align-items:flex-end}.field{display:flex;flex-direction:column;gap:6px}.field label{font-size:12px;color:var(--gray-500);font-weight:800}.field input,.field select{min-width:160px;border:1.5px solid var(--gray-300);border-radius:12px;padding:10px 12px;font:inherit;outline:none}.field input:focus,.field select:focus{border-color:var(--green)}.small-btn{border:0;border-radius:12px;padding:10px 13px;font:inherit;font-size:13px;font-weight:900;background:var(--green);color:#fff;cursor:pointer}.small-btn.blue{background:var(--blue)}.small-btn.red{background:var(--red)}.table-wrap{overflow:auto;border-radius:16px;border:1px solid var(--gray-200)}table{width:100%;border-collapse:collapse;background:#fff;min-width:680px}th,td{padding:12px 14px;text-align:left;border-bottom:1px solid var(--gray-200);font-size:14px}th{font-size:12px;color:var(--gray-500);background:var(--gray-50);text-transform:uppercase;letter-spacing:.04em}td.rank{font-weight:900;color:var(--green);width:72px}.name{font-weight:900}.points{font-size:20px;font-weight:900;color:var(--green-dark)}.tag{display:inline-flex;align-items:center;border-radius:999px;padding:4px 9px;background:var(--gray-100);font-size:12px;font-weight:800;color:var(--gray-700)}.empty{padding:30px;text-align:center;color:var(--gray-500);line-height:1.7}.note{font-size:13px;color:var(--gray-700);line-height:1.7}.log{display:grid;gap:8px}.log-row{display:flex;justify-content:space-between;gap:10px;background:var(--gray-50);border:1px solid var(--gray-200);border-radius:12px;padding:10px 12px;font-size:13px;color:var(--gray-700)}
.admin-cell{display:none}body.is-admin th.admin-cell,body.is-admin td.admin-cell{display:table-cell}.row-delete{border:0;border-radius:10px;padding:7px 10px;background:var(--red);color:#fff;font:inherit;font-size:12px;font-weight:900;cursor:pointer}
@media(max-width:720px){body{padding:12px}.hero{border-radius:20px;padding:18px}.stats{grid-template-columns:repeat(2,minmax(0,1fr))}.btn{width:100%}.field{width:100%}.field input,.field select{width:100%;min-width:0}.small-btn{width:100%}}
</style>
</head>
<body>
<main class="page">
  <section class="hero">
    <div class="hero-top">
      <div>
        <h1>🏆 Dove Cup<br>积分榜</h1>
        <p class="subtitle">参赛 +50 分；每赢 1 个 game +10 分。数据保存在 Firebase，所有人实时看到同一份排行榜。</p>
      </div>
      <div class="status-pill" id="syncStatus">实时同步中</div>
    </div>
    <div class="actions">
      <button class="btn" id="adminBtn" onclick="toggleAdmin()">Admin</button>
      <button class="btn secondary" onclick="goPage('index.html')">报名页</button>
      <button class="btn secondary" onclick="goPage('courts.html')">场地分组</button>
    </div>
  </section>
  <section class="stats">
    <div class="stat-card"><div class="num" id="playerCount">0</div><div class="label">参赛人员</div></div>
    <div class="stat-card"><div class="num" id="totalAppearances">0</div><div class="label">累计参赛</div></div>
    <div class="stat-card"><div class="num" id="totalWins">0</div><div class="label">累计赢局</div></div>
    <div class="stat-card"><div class="num" id="topScore">0</div><div class="label">最高积分</div></div>
  </section>
  <section class="panel admin-control">
    <div class="panel-title">管理员更新积分</div>
    <div class="admin-grid">
      <button class="small-btn" onclick="importCurrentJoined()">本场报名名单全部参赛 +50</button>
      <div class="field"><label>人员姓名</label><input id="playerNameInput" placeholder="输入姓名"></div>
      <div class="field"><label>赢的 game 数</label><input id="winsInput" type="number" min="0" value="1"></div>
      <button class="small-btn blue" onclick="addWins()">给此人加赢局积分</button>
      <button class="small-btn" onclick="addManualParticipation()">单独给此人参赛 +50</button>
      <button class="small-btn red" onclick="resetPlayer()">删除此人积分记录</button>
      <button class="small-btn red" onclick="resetAllScores()">重置全部积分</button>
    </div>
    <p class="note" style="margin-top:12px">建议流程：比赛当天先点“本场报名名单全部参赛 +50”，然后逐个录入每个人赢了几个 game。</p>
  </section>
  <section class="panel">
    <div class="panel-title">积分表格</div>
    <div class="table-wrap"><table><thead><tr><th>排名</th><th>姓名</th><th>积分</th><th>参赛次数</th><th>赢局</th><th>明细</th><th class="admin-cell">操作</th></tr></thead><tbody id="scoreRows"></tbody></table></div>
    <div id="emptyState" class="empty" style="display:none">还没有积分记录。管理员录入第一场参赛后，这里会出现排行榜。</div>
  </section>
  <section class="panel">
    <div class="panel-title">最近更新</div>
    <div id="eventLog" class="log"></div>
  </section>
</main>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-database-compat.js"></script>
<script>
const ADMIN_PASSWORD='8888';
const ADMIN_STORAGE='scores_is_admin';
const SITE_VERSION='26';
const SIGNUP_DB_PATH='doveCupWaitlistSystem/main';
const SCORE_DB_PATH='doveCupWaitlistSystem/scores';
const FIREBASE_CONFIG={apiKey:'AIzaSyBPTwRAkfHjCA_RCQu5t2udzllF3Rz_CCo',authDomain:'dovecupdatabase.firebaseapp.com',databaseURL:'https://dovecupdatabase-default-rtdb.firebaseio.com/',projectId:'dovecupdatabase',storageBucket:'dovecupdatabase.firebasestorage.app',messagingSenderId:'814970094950',appId:'1:814970094950:web:c061c00eaceed40125b4a7'};
let scoreRef=null,signupRef=null,scoreData={players:{},events:[]},signupState={joined:[]},isAdminMode=sessionStorage.getItem(ADMIN_STORAGE)==='1';
function goPage(page){location.href=`${page}?v=${SITE_VERSION}`}
if(new URLSearchParams(location.search).get('v')!==SITE_VERSION){history.replaceState(null,'',`${location.pathname}?v=${SITE_VERSION}`)}
function keyForName(name){return name.trim().toLowerCase().replace(/[.#$/[\]]/g,'_')}
function normalizeScoreData(data){const next=data||{};next.players=next.players&&typeof next.players==='object'?next.players:{};next.events=Array.isArray(next.events)?next.events:[];return next}
function playerList(){return Object.values(scoreData.players).sort((a,b)=>(b.points||0)-(a.points||0)||(b.wins||0)-(a.wins||0)||String(a.name).localeCompare(String(b.name),'zh-Hans-CN'))}
function renderAdmin(){document.body.classList.toggle('is-admin',isAdminMode);document.getElementById('adminBtn').textContent=isAdminMode?'Admin 已登录':'Admin'}
function toggleAdmin(){if(isAdminMode){isAdminMode=false;sessionStorage.removeItem(ADMIN_STORAGE);renderAdmin();render();return}const pass=prompt('请输入管理员密码');if(pass===ADMIN_PASSWORD){isAdminMode=true;sessionStorage.setItem(ADMIN_STORAGE,'1');renderAdmin();render()}else if(pass!==null){alert('密码错误')}}
function requireAdmin(){if(isAdminMode)return true;alert('只有管理员可以更新积分');return false}
function saveScores(){if(scoreRef)scoreRef.set(Object.assign({},scoreData,{updatedAt:Date.now()})).catch(()=>alert('保存失败，请检查网络'))}
function ensurePlayer(name){const clean=name.trim();if(!clean)return null;const key=keyForName(clean);if(!scoreData.players[key])scoreData.players[key]={key,name:clean,appearances:0,wins:0,points:0,lastPlayedAt:null,updatedAt:Date.now()};return scoreData.players[key]}
function addEvent(type,names,wins=0){scoreData.events.unshift({type,names,wins,ts:Date.now()});scoreData.events=scoreData.events.slice(0,20)}
function importCurrentJoined(){if(!requireAdmin())return;const joined=Array.isArray(signupState.joined)?signupState.joined:[];if(!joined.length){alert('当前报名名单为空');return}joined.forEach(p=>{const player=ensurePlayer(p.name);if(!player)return;player.appearances=(player.appearances||0)+1;player.points=(player.points||0)+50;player.lastPlayedAt=Date.now();player.updatedAt=Date.now()});addEvent('participation',joined.map(p=>p.name));saveScores();render()}
function addManualParticipation(){if(!requireAdmin())return;const name=document.getElementById('playerNameInput').value.trim();const player=ensurePlayer(name);if(!player){alert('请输入姓名');return}player.appearances=(player.appearances||0)+1;player.points=(player.points||0)+50;player.lastPlayedAt=Date.now();player.updatedAt=Date.now();addEvent('manualParticipation',[player.name]);saveScores();render()}
function addWins(){if(!requireAdmin())return;const name=document.getElementById('playerNameInput').value.trim();const wins=parseInt(document.getElementById('winsInput').value,10);if(!name||!Number.isFinite(wins)||wins<0){alert('请输入姓名和有效赢局数');return}const player=ensurePlayer(name);player.wins=(player.wins||0)+wins;player.points=(player.points||0)+wins*10;player.updatedAt=Date.now();addEvent('wins',[player.name],wins);saveScores();render()}
function resetPlayer(){if(!requireAdmin())return;const name=document.getElementById('playerNameInput').value.trim();if(!name){alert('请输入要删除的姓名');return}deletePlayerByKey(keyForName(name))}
function deletePlayerFromButton(btn){deletePlayerByKey(btn.dataset.key)}
function deletePlayerByKey(key){if(!requireAdmin())return;const player=scoreData.players[key];if(!player){alert('积分表里找不到这个人');return}if(!confirm(`确定删除 ${player.name} 的积分记录吗？`))return;delete scoreData.players[key];addEvent('deletePlayer',[player.name]);saveScores();render()}
function resetAllScores(){if(!requireAdmin())return;if(!confirm('确定重置全部积分吗？这个操作会清空所有参赛和赢局记录。'))return;scoreData={players:{},events:[{type:'resetAll',names:[],ts:Date.now()}]};saveScores();render()}
function render(){const list=playerList();document.getElementById('playerCount').textContent=list.length;document.getElementById('totalAppearances').textContent=list.reduce((s,p)=>s+(p.appearances||0),0);document.getElementById('totalWins').textContent=list.reduce((s,p)=>s+(p.wins||0),0);document.getElementById('topScore').textContent=list[0]?.points||0;document.getElementById('emptyState').style.display=list.length?'none':'block';document.getElementById('scoreRows').innerHTML=list.map((p,i)=>`<tr><td class="rank">${i+1}</td><td class="name">${escapeHtml(p.name)}</td><td class="points">${p.points||0}</td><td><span class="tag">${p.appearances||0} 次</span></td><td><span class="tag">${p.wins||0} game</span></td><td>参赛 ${p.appearances||0}×50 + 赢局 ${p.wins||0}×10</td><td class="admin-cell"><button class="row-delete" data-key="${escapeHtml(p.key)}" onclick="deletePlayerFromButton(this)">删除</button></td></tr>`).join('');document.getElementById('eventLog').innerHTML=scoreData.events.length?scoreData.events.slice(0,8).map(e=>`<div class="log-row"><span>${eventText(e)}</span><span>${new Date(e.ts).toLocaleString('zh-CN')}</span></div>`).join(''):'<div class="empty">暂无更新记录</div>'}
function eventText(e){if(e.type==='participation')return `导入参赛：${(e.names||[]).length} 人，每人 +50`;if(e.type==='manualParticipation')return `${(e.names||[])[0]} 参赛 +50`;if(e.type==='wins')return `${(e.names||[])[0]} 赢 ${e.wins||0} game，+${(e.wins||0)*10}`;if(e.type==='courtScores')return '场地比分已自动同步到积分榜';if(e.type==='deletePlayer'||e.type==='resetPlayer')return `${(e.names||[])[0]} 积分记录已删除`;if(e.type==='resetAll')return '全部积分已重置';return '积分更新'}
function escapeHtml(v){return String(v).replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]))}
function start(){renderAdmin();if(!window.firebase||!firebase.database){document.getElementById('syncStatus').textContent='Firebase 加载失败';render();return}if(!firebase.apps.length)firebase.initializeApp(FIREBASE_CONFIG);scoreRef=firebase.database().ref(SCORE_DB_PATH);signupRef=firebase.database().ref(SIGNUP_DB_PATH);scoreRef.on('value',snap=>{scoreData=normalizeScoreData(snap.val());document.getElementById('syncStatus').textContent='积分实时同步中';render()});signupRef.on('value',snap=>{const data=snap.val();signupState=data&&data.state?data.state:{joined:[]}})}
start();
</script>
</body>
</html>
