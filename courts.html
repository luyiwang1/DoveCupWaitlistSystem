<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dove Cup 5个场地分组表</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--green:#07C160;--green-dark:#059A4A;--green-light:#E8F9EF;--orange:#FF8C00;--orange-light:#FFF3E0;--red:#FA5151;--gray-50:#FAFAFA;--gray-100:#F7F7F7;--gray-200:#EFEFEF;--gray-300:#DCDCDC;--gray-500:#999;--gray-700:#555;--ink:#1A1A1A;--white:#fff;--shadow:0 8px 28px rgba(0,0,0,.08);--shadow-soft:0 2px 12px rgba(0,0,0,.06)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}body{font-family:'Noto Sans SC',-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(circle at top left,#E8F9EF 0,transparent 28%),var(--gray-100);color:var(--ink);min-height:100dvh;padding:18px}.page{max-width:1180px;margin:0 auto}.hero{position:relative;overflow:hidden;background:linear-gradient(135deg,#07C160 0%,#00D56A 58%,#10AEFF 140%);color:#fff;border-radius:28px;padding:24px;box-shadow:0 16px 44px rgba(7,193,96,.24);margin-bottom:16px}.hero::after{content:"";position:absolute;width:260px;height:260px;border-radius:50%;right:-90px;top:-100px;background:rgba(255,255,255,.16)}.hero-top{position:relative;z-index:1;display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap}h1{font-size:clamp(26px,4vw,42px);line-height:1.08;letter-spacing:-.04em;font-weight:900}.subtitle{margin-top:10px;font-size:14px;opacity:.92;line-height:1.6}.status-pill{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.34);border-radius:999px;padding:8px 13px;font-size:13px;font-weight:800;white-space:nowrap}.actions{position:relative;z-index:1;display:flex;gap:10px;flex-wrap:wrap;margin-top:22px}button{font-family:inherit;border:0;cursor:pointer;transition:transform .12s ease}button:active{transform:scale(.97)}.btn{border-radius:999px;padding:11px 16px;font-size:14px;font-weight:900;background:#fff;color:var(--green-dark);box-shadow:0 4px 16px rgba(0,0,0,.1)}.btn.secondary{color:#fff;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.38);box-shadow:none}.btn.dark{color:#fff;background:rgba(0,0,0,.18);border:1px solid rgba(255,255,255,.22);box-shadow:none}.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:16px}.stat-card{background:#fff;border-radius:20px;padding:16px;box-shadow:var(--shadow-soft);border:1px solid rgba(0,0,0,.03)}.stat-card .num{font-size:28px;font-weight:900;color:var(--green);letter-spacing:-.04em}.stat-card .label{color:var(--gray-500);font-size:12px;margin-top:4px;font-weight:700}.panel{background:rgba(255,255,255,.74);border:1px solid rgba(255,255,255,.9);border-radius:24px;padding:14px;box-shadow:var(--shadow);margin-bottom:16px}.notice{display:flex;align-items:flex-start;gap:10px;color:var(--gray-700);font-size:13px;line-height:1.6;background:#fff;border-radius:16px;padding:12px 14px;border:1px solid var(--gray-200)}.court-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:12px}.court{background:#fff;border-radius:20px;overflow:hidden;border:1px solid var(--gray-200);box-shadow:var(--shadow-soft);min-height:260px}.court-head{padding:14px;background:linear-gradient(135deg,var(--green-light),#F5FFF8);border-bottom:1px solid var(--gray-200);display:flex;align-items:center;justify-content:space-between;gap:10px}.court-name{font-weight:900;color:var(--green-dark);font-size:16px}.count-pill{color:var(--gray-700);background:#fff;border-radius:999px;padding:4px 9px;font-size:12px;font-weight:900;box-shadow:0 1px 4px rgba(0,0,0,.05);white-space:nowrap}.player-list{padding:10px}.player{display:grid;grid-template-columns:24px 1fr auto;align-items:center;gap:8px;background:var(--gray-50);border:1px solid var(--gray-200);border-radius:14px;padding:10px;margin-bottom:8px;font-size:13px;line-height:1.25;font-weight:700}.rank{width:24px;height:24px;border-radius:50%;display:grid;place-items:center;background:var(--gray-200);color:var(--gray-700);font-size:11px;font-weight:900}.player-name{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.captain{background:linear-gradient(135deg,var(--orange-light),#FFE5B5);border-color:var(--orange);box-shadow:0 8px 20px rgba(255,140,0,.16)}.captain .rank{color:#fff;background:var(--orange)}.captain-badge{color:#fff;background:var(--orange);border-radius:999px;font-size:11px;font-weight:900;padding:4px 7px;white-space:nowrap}.empty{padding:24px 12px;text-align:center;color:var(--gray-500);font-size:13px;line-height:1.5}.loading,.error{background:#fff;border-radius:20px;padding:24px;text-align:center;color:var(--gray-700);box-shadow:var(--shadow-soft);line-height:1.7}.error{color:var(--red)}.manual-box{display:none;margin-top:12px;background:#fff;border:1px solid var(--gray-200);border-radius:18px;padding:14px}textarea{width:100%;min-height:150px;resize:vertical;border:1.5px solid var(--gray-300);border-radius:14px;padding:12px;font-family:inherit;font-size:14px;outline:none;line-height:1.5}textarea:focus{border-color:var(--green)}.manual-actions{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap}.small-btn{border-radius:12px;padding:9px 12px;font-size:13px;font-weight:900;background:var(--green);color:#fff}.small-btn.light{background:var(--gray-200);color:var(--gray-700)}.copy-output{display:none;margin-top:16px;white-space:pre-wrap;background:#111827;color:#fff;border-radius:18px;padding:16px;font-size:13px;line-height:1.65;box-shadow:var(--shadow)}
@media(max-width:980px){.court-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.stats{grid-template-columns:repeat(2,minmax(0,1fr))}}@media(max-width:620px){body{padding:12px}.hero{border-radius:22px;padding:18px}.court-grid{grid-template-columns:1fr}.court{min-height:auto}.stats{grid-template-columns:repeat(2,minmax(0,1fr))}.btn{width:100%}}@media print{body{background:#fff;padding:8px}.page{max-width:none}.hero,.panel,.stat-card,.court{box-shadow:none}.actions,.notice,.manual-box,.copy-output{display:none!important}.stats{grid-template-columns:repeat(4,1fr)}.court-grid{grid-template-columns:repeat(5,1fr);gap:8px}.court{min-height:auto;break-inside:avoid}.player{font-size:11px;padding:7px;grid-template-columns:20px 1fr}.captain-badge{grid-column:2;width:fit-content}.hero{color:#111;background:#fff;border:1px solid #ddd}.status-pill{color:#111;border-color:#ddd;background:#fff}}
</style>
</head>
<body>
<main class="page">
<section class="hero"><div class="hero-top"><div><h1>🎾 Dove Cup<br>5个场地分组表</h1><p class="subtitle" id="eventTitle">正在读取接龙报名名单...</p></div><div class="status-pill" id="syncStatus">实时同步中</div></div><div class="actions"><button class="btn" onclick="reshuffle()">🎲 重新随机分组 + 队长</button><button class="btn secondary" onclick="randomizeCaptainsOnly()">⭐ 只重抽队长</button><button class="btn secondary" onclick="copyCourtText()">📋 复制分组文字</button><button class="btn dark" onclick="toggleManualBox()">✍️ 手动输入名单</button></div></section>
<section class="stats"><div class="stat-card"><div class="num" id="totalPlayers">0</div><div class="label">报名人数</div></div><div class="stat-card"><div class="num">5</div><div class="label">场地数</div></div><div class="stat-card"><div class="num" id="perCourt">0</div><div class="label">平均每场</div></div><div class="stat-card"><div class="num" id="captainCount">0</div><div class="label">队长人数</div></div></section>
<section class="panel"><div class="notice"><span>💡</span><span>默认自动读取接龙里“报名名单”的人，不包含 Waitlist。系统会尽量平均分到 5 个场地，并在每个有人的场地随机 highlight 一位队长。</span></div><div class="manual-box" id="manualBox"><textarea id="manualNames" placeholder="每行一个名字，例如：&#10;Luyi&#10;Alex&#10;Kevin&#10;May"></textarea><div class="manual-actions"><button class="small-btn" onclick="useManualNames()">使用这份名单分组</button><button class="small-btn light" onclick="clearManualNames()">清空</button></div></div></section>
<section id="loading" class="loading">正在快速读取接龙名单...</section><section id="error" class="error" style="display:none"></section><section id="courtGrid" class="court-grid" style="display:none"></section><pre id="copyOutput" class="copy-output"></pre>
</main>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-database-compat.js"></script>
<script>
const COURT_COUNT=5;const DB_PATH='doveCupWaitlistSystem/main';const FIREBASE_CONFIG={apiKey:'AIzaSyBPTwRAkfHjCA_RCQu5t2udzllF3Rz_CCo',authDomain:'dovecupdatabase.firebaseapp.com',databaseURL:'https://dovecupdatabase-default-rtdb.firebaseio.com/',projectId:'dovecupdatabase',storageBucket:'dovecupdatabase.firebasestorage.app',messagingSenderId:'814970094950',appId:'1:814970094950:web:c061c00eaceed40125b4a7'};let players=[];let courts=Array.from({length:COURT_COUNT},()=>[]);let captainByCourt={};let usingManual=false;
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}function splitIntoCourts(list){const result=Array.from({length:COURT_COUNT},()=>[]);list.forEach((p,i)=>result[i%COURT_COUNT].push(p));return result}function pickCaptains(){captainByCourt={};courts.forEach((court,idx)=>{if(!court.length)return;const captain=court[Math.floor(Math.random()*court.length)];captainByCourt[idx]=captain.key})}function reshuffle(){courts=splitIntoCourts(shuffle(players));pickCaptains();render()}function randomizeCaptainsOnly(){pickCaptains();render()}function render(){document.getElementById('loading').style.display='none';document.getElementById('error').style.display='none';document.getElementById('courtGrid').style.display='grid';const nonEmptyCourts=courts.filter(c=>c.length).length;document.getElementById('totalPlayers').textContent=players.length;document.getElementById('perCourt').textContent=players.length?`${Math.floor(players.length/COURT_COUNT)}-${Math.ceil(players.length/COURT_COUNT)}`:'0';document.getElementById('captainCount').textContent=nonEmptyCourts;document.getElementById('courtGrid').innerHTML=courts.map((court,idx)=>{const rows=court.length?court.map((p,i)=>{const isCaptain=captainByCourt[idx]===p.key;return `<div class="player ${isCaptain?'captain':''}"><span class="rank">${i+1}</span><span class="player-name" title="${escapeHtml(p.name)}">${escapeHtml(p.name)}</span>${isCaptain?'<span class="captain-badge">队长</span>':''}</div>`}).join(''):'<div class="empty">暂无人员</div>';return `<article class="court"><div class="court-head"><span class="court-name">Court ${idx+1}</span><span class="count-pill">${court.length} 人</span></div><div class="player-list">${rows}</div></article>`}).join('')}
function copyCourtText(){const text=courts.map((court,idx)=>{const lines=court.length?court.map((p,i)=>`${i+1}. ${p.name}${captainByCourt[idx]===p.key?' ⭐队长':''}`).join('\n'):'暂无人员';return `Court ${idx+1}（${court.length}人）\n${lines}`}).join('\n\n');const finalText=`🎾 Dove Cup 5个场地分组表\n共 ${players.length} 人\n\n${text}`;if(navigator.clipboard)navigator.clipboard.writeText(finalText).catch(()=>{});const output=document.getElementById('copyOutput');output.textContent=finalText;output.style.display='block'}function toggleManualBox(){const box=document.getElementById('manualBox');box.style.display=box.style.display==='block'?'none':'block'}function useManualNames(){const raw=document.getElementById('manualNames').value.trim();if(!raw)return;usingManual=true;players=raw.split('\n').map(x=>x.trim()).filter(Boolean).map((name,i)=>({key:`manual-${i}-${name}`,name}));document.getElementById('eventTitle').textContent='手动名单 · 本地随机分组';document.getElementById('syncStatus').textContent='手动模式';reshuffle()}function clearManualNames(){document.getElementById('manualNames').value=''}function escapeHtml(v){return String(v).replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]))}function showError(message){document.getElementById('loading').style.display='none';const error=document.getElementById('error');error.textContent=message;error.style.display='block';document.getElementById('syncStatus').textContent='读取失败';document.getElementById('manualBox').style.display='block'}function applyRemoteState(data){if(usingManual)return;const state=data&&data.state?data.state:{};const joined=Array.isArray(state.joined)?state.joined:[];players=joined.filter(p=>p&&p.name).map((p,i)=>({key:String(p.id??`${p.name}-${i}`),name:p.name}));document.getElementById('eventTitle').textContent=state.title?`${state.title} · 自动读取报名名单`:'自动读取报名名单';document.getElementById('syncStatus').textContent=`已同步 ${players.length} 人`;reshuffle()}async function fetchRealtimeDataOnce(){const controller=new AbortController();const timer=setTimeout(()=>controller.abort(),4000);try{const url=`${FIREBASE_CONFIG.databaseURL.replace(/\/$/,'')}/${DB_PATH}.json`;const res=await fetch(url,{signal:controller.signal,cache:'no-store'});if(!res.ok)throw new Error(`HTTP ${res.status}`);const data=await res.json();applyRemoteState(data);return true}finally{clearTimeout(timer)}}function startFirebaseLiveSync(){try{if(!window.firebase||!firebase.database)return;if(!firebase.apps.length)firebase.initializeApp(FIREBASE_CONFIG);firebase.database().ref(DB_PATH).on('value',snapshot=>{applyRemoteState(snapshot.val())})}catch(e){}}async function loadRealtimeData(){try{const ok=await fetchRealtimeDataOnce();if(ok)startFirebaseLiveSync()}catch(e){showError('读取接龙数据失败。你可以点“手动输入名单”直接生成分组。')}}loadRealtimeData();
</script>
</body>
</html>
