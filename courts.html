<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dove Cup 场地分组表</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--green:#07C160;--green-dark:#059A4A;--green-light:#E8F9EF;--orange:#FF8C00;--orange-light:#FFF3E0;--red:#FA5151;--gray-50:#FAFAFA;--gray-100:#F7F7F7;--gray-200:#EFEFEF;--gray-300:#DCDCDC;--gray-500:#999;--gray-700:#555;--ink:#1A1A1A;--white:#fff;--shadow:0 8px 28px rgba(0,0,0,.08);--shadow-soft:0 2px 12px rgba(0,0,0,.06)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}body{font-family:'Noto Sans SC',-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--gray-100);color:var(--ink);min-height:100dvh;padding:18px}.page{max-width:1180px;margin:0 auto}.hero{background:linear-gradient(135deg,#07C160 0%,#00D56A 62%,#10AEFF 140%);color:#fff;border-radius:24px;padding:24px;box-shadow:0 16px 44px rgba(7,193,96,.22);margin-bottom:16px}.hero-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap}h1{font-size:clamp(26px,4vw,42px);line-height:1.1;font-weight:900}.subtitle{margin-top:10px;font-size:14px;opacity:.92;line-height:1.6}.status-pill{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.34);border-radius:999px;padding:8px 13px;font-size:13px;font-weight:800;white-space:nowrap}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:22px}.admin-control{display:none}body.is-admin .admin-control{display:inline-flex}.btn,.small-btn{font-family:inherit;border:0;cursor:pointer;transition:transform .12s ease}.btn:active,.small-btn:active{transform:scale(.97)}.btn{border-radius:999px;padding:11px 16px;font-size:14px;font-weight:900;background:#fff;color:var(--green-dark);box-shadow:0 4px 16px rgba(0,0,0,.1)}.btn.secondary{color:#fff;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.38);box-shadow:none}.btn.dark{color:#fff;background:rgba(0,0,0,.18);border:1px solid rgba(255,255,255,.22);box-shadow:none}.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:16px}.stat-card{background:#fff;border-radius:18px;padding:16px;box-shadow:var(--shadow-soft);border:1px solid rgba(0,0,0,.03)}.stat-card .num{font-size:28px;font-weight:900;color:var(--green)}.stat-card .label{color:var(--gray-500);font-size:12px;margin-top:4px;font-weight:700}.panel{background:#fff;border-radius:20px;padding:14px;box-shadow:var(--shadow);margin-bottom:16px}.notice{display:flex;align-items:flex-start;gap:10px;color:var(--gray-700);font-size:13px;line-height:1.6}.admin-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:12px}.admin-row input{width:88px;border:1.5px solid var(--gray-300);border-radius:12px;padding:9px 10px;font:inherit;font-weight:800;text-align:center}.small-btn{border-radius:12px;padding:9px 12px;font-size:13px;font-weight:900;background:var(--green);color:#fff}.small-btn.light{background:var(--gray-200);color:var(--gray-700)}.court-grid{display:grid;grid-template-columns:repeat(var(--court-count,4),minmax(0,1fr));gap:12px}.court{background:#fff;border-radius:18px;overflow:hidden;border:1px solid var(--gray-200);box-shadow:var(--shadow-soft);min-height:240px}.court-head{padding:14px;background:linear-gradient(135deg,var(--green-light),#F5FFF8);border-bottom:1px solid var(--gray-200);display:flex;align-items:center;justify-content:space-between;gap:10px}.court-name{font-weight:900;color:var(--green-dark);font-size:16px}.count-pill{color:var(--gray-700);background:#fff;border-radius:999px;padding:4px 9px;font-size:12px;font-weight:900}.player-list{padding:10px}.player{display:grid;grid-template-columns:24px 1fr auto;align-items:center;gap:8px;background:var(--gray-50);border:1px solid var(--gray-200);border-radius:14px;padding:10px;margin-bottom:8px;font-size:13px;font-weight:700}.rank{width:24px;height:24px;border-radius:50%;display:grid;place-items:center;background:var(--gray-200);color:var(--gray-700);font-size:11px;font-weight:900}.player-name{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.captain{background:linear-gradient(135deg,var(--orange-light),#FFE5B5);border-color:var(--orange)}.captain .rank{color:#fff;background:var(--orange)}.captain-badge{color:#fff;background:var(--orange);border-radius:999px;font-size:11px;font-weight:900;padding:4px 7px}.empty,.loading,.error{text-align:center;color:var(--gray-500);font-size:13px;line-height:1.6;padding:24px}.loading,.error{background:#fff;border-radius:18px;box-shadow:var(--shadow-soft)}.error{color:var(--red)}.manual-box{display:none;margin-top:12px;background:#fff;border:1px solid var(--gray-200);border-radius:18px;padding:14px}textarea{width:100%;min-height:150px;resize:vertical;border:1.5px solid var(--gray-300);border-radius:14px;padding:12px;font-family:inherit;font-size:14px;outline:none;line-height:1.5}.manual-actions{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap}.copy-output{display:none;margin-top:16px;white-space:pre-wrap;background:#111827;color:#fff;border-radius:18px;padding:16px;font-size:13px;line-height:1.65;box-shadow:var(--shadow)}
@media(max-width:980px){.court-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.stats{grid-template-columns:repeat(2,minmax(0,1fr))}}@media(max-width:620px){body{padding:12px}.hero{border-radius:20px;padding:18px}.court-grid{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,minmax(0,1fr))}.btn{width:100%}}@media print{body{background:#fff;padding:8px}.page{max-width:none}.hero,.panel,.stat-card,.court{box-shadow:none}.actions,.notice,.manual-box,.copy-output{display:none!important}.stats{grid-template-columns:repeat(4,1fr)}.court-grid{grid-template-columns:repeat(var(--court-count,4),1fr);gap:8px}.court{min-height:auto;break-inside:avoid}.player{font-size:11px;padding:7px;grid-template-columns:20px 1fr}.hero{color:#111;background:#fff;border:1px solid #ddd}.status-pill{color:#111;border-color:#ddd;background:#fff}}
</style>
</head>
<body>
<main class="page">
  <section class="hero">
    <div class="hero-top">
      <div>
        <h1>🎾 Dove Cup<br>场地分组表</h1>
        <p class="subtitle" id="eventTitle">正在读取接龙报名名单...</p>
      </div>
      <div class="status-pill" id="syncStatus">实时同步中</div>
    </div>
    <div class="actions">
      <button class="btn" id="adminBtn" onclick="toggleAdmin()">Admin</button>
      <button class="btn admin-control" onclick="reshuffle()">🎲 重新随机分组 + 队长</button>
      <button class="btn secondary admin-control" onclick="randomizeCaptainsOnly()">⭐ 只重抽队长</button>
      <button class="btn secondary" onclick="copyCourtText()">📋 复制分组文字</button>
      <button class="btn secondary" onclick="location.href='scores.html'">🏆 积分榜</button>
      <button class="btn dark admin-control" onclick="toggleManualBox()">✍️ 手动输入名单</button>
    </div>
  </section>
  <section class="stats">
    <div class="stat-card"><div class="num" id="totalPlayers">0</div><div class="label">报名人数</div></div>
    <div class="stat-card"><div class="num" id="courtCountStat">5</div><div class="label">场地数</div></div>
    <div class="stat-card"><div class="num" id="perCourt">0</div><div class="label">平均每场</div></div>
    <div class="stat-card"><div class="num" id="captainCount">0</div><div class="label">队长人数</div></div>
  </section>
  <section class="panel">
    <div class="notice"><span>💡</span><span>默认自动读取接龙里“报名名单”的人，不包含 Waitlist。管理员可以修改场地数量，系统会把名单尽量平均分组并保存到数据库。</span></div>
    <div class="admin-row admin-control">
      <label for="courtCountInput">场地数量</label>
      <input id="courtCountInput" type="number" min="1" max="20" value="5">
      <button class="small-btn" onclick="saveCourtCount()">保存场地数</button>
    </div>
    <div class="manual-box" id="manualBox">
      <textarea id="manualNames" placeholder="每行一个名字，例如：&#10;Luyi&#10;Alex&#10;Kevin&#10;May"></textarea>
      <div class="manual-actions">
        <button class="small-btn" onclick="useManualNames()">使用这份名单分组</button>
        <button class="small-btn light" onclick="clearManualNames()">清空</button>
      </div>
    </div>
  </section>
  <section id="loading" class="loading">正在快速读取接龙名单...</section>
  <section id="error" class="error" style="display:none"></section>
  <section id="courtGrid" class="court-grid" style="display:none"></section>
  <pre id="copyOutput" class="copy-output"></pre>
</main>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-database-compat.js"></script>
<script>
const ADMIN_PASSWORD='8888';
const ADMIN_STORAGE='courts_is_admin';
const DB_PATH='doveCupWaitlistSystem/main';
const COURTS_DB_PATH='doveCupWaitlistSystem/courtsPage';
const FIREBASE_CONFIG={apiKey:'AIzaSyBPTwRAkfHjCA_RCQu5t2udzllF3Rz_CCo',authDomain:'dovecupdatabase.firebaseapp.com',databaseURL:'https://dovecupdatabase-default-rtdb.firebaseio.com/',projectId:'dovecupdatabase',storageBucket:'dovecupdatabase.firebasestorage.app',messagingSenderId:'814970094950',appId:'1:814970094950:web:c061c00eaceed40125b4a7'};
let courtCount=5,players=[],courts=[],captainByCourt={},savedLayout=null,remoteCourtsRef=null,usingManual=false,isAdminMode=sessionStorage.getItem(ADMIN_STORAGE)==='1';
function renderAdmin(){document.body.classList.toggle('is-admin',isAdminMode);const btn=document.getElementById('adminBtn');if(btn)btn.textContent=isAdminMode?'Admin 已登录':'Admin';if(!isAdminMode)document.getElementById('manualBox').style.display='none'}
function toggleAdmin(){if(isAdminMode){isAdminMode=false;sessionStorage.removeItem(ADMIN_STORAGE);renderAdmin();return}const pass=prompt('请输入管理员密码');if(pass===ADMIN_PASSWORD){isAdminMode=true;sessionStorage.setItem(ADMIN_STORAGE,'1');renderAdmin()}else if(pass!==null){alert('密码错误')}}
function requireAdmin(){if(isAdminMode)return true;alert('只有管理员可以修改分组');return false}
function escapeHtml(v){return String(v).replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]))}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function splitIntoCourts(list){const result=Array.from({length:courtCount},()=>[]);list.forEach((p,i)=>result[i%courtCount].push(p));return result}
function pickCaptains(){captainByCourt={};courts.forEach((court,idx)=>{if(!court.length)return;captainByCourt[idx]=court[Math.floor(Math.random()*court.length)].key})}
function buildLayoutPayload(){return{courtCount,courts:courts.map(court=>court.map(p=>p.key)),captainByCourt,updatedAt:Date.now()}}
function saveLayout(){savedLayout=buildLayoutPayload();if(remoteCourtsRef)remoteCourtsRef.set(savedLayout).catch(()=>alert('分组保存失败，请检查网络'))}
function applySavedLayout(){const byKey=new Map(players.map(p=>[p.key,p]));const used=new Set();const next=Array.from({length:courtCount},()=>[]);if(savedLayout&&Array.isArray(savedLayout.courts)){savedLayout.courts.slice(0,courtCount).forEach((court,idx)=>{if(!Array.isArray(court))return;court.forEach(key=>{const p=byKey.get(String(key));if(p&&!used.has(p.key)){next[idx].push(p);used.add(p.key)}})})}players.forEach(p=>{if(used.has(p.key))return;let target=0;for(let i=1;i<courtCount;i++)if(next[i].length<next[target].length)target=i;next[target].push(p);used.add(p.key)});courts=next;captainByCourt={};const savedCaptains=savedLayout&&savedLayout.captainByCourt?savedLayout.captainByCourt:{};courts.forEach((court,idx)=>{const savedKey=savedCaptains[idx];captainByCourt[idx]=court.some(p=>p.key===savedKey)?savedKey:(court[0]?court[0].key:null)});render()}
function buildRandomCourts(shouldSave=false){courts=splitIntoCourts(shuffle(players));pickCaptains();render();if(shouldSave)saveLayout()}
function reshuffle(){if(!requireAdmin())return;buildRandomCourts(true)}
function randomizeCaptainsOnly(){if(!requireAdmin())return;pickCaptains();render();saveLayout()}
function saveCourtCount(){if(!requireAdmin())return;const val=parseInt(document.getElementById('courtCountInput').value,10);if(!Number.isFinite(val)||val<1||val>20){alert('请输入 1-20 的场地数量');return}courtCount=val;buildRandomCourts(true)}
function render(){document.documentElement.style.setProperty('--court-count',Math.min(courtCount,6));document.getElementById('loading').style.display='none';document.getElementById('error').style.display='none';document.getElementById('courtGrid').style.display='grid';document.getElementById('courtCountInput').value=courtCount;document.getElementById('courtCountStat').textContent=courtCount;const nonEmptyCourts=courts.filter(c=>c.length).length;document.getElementById('totalPlayers').textContent=players.length;document.getElementById('perCourt').textContent=players.length?`${Math.floor(players.length/courtCount)}-${Math.ceil(players.length/courtCount)}`:'0';document.getElementById('captainCount').textContent=nonEmptyCourts;document.getElementById('courtGrid').innerHTML=courts.map((court,idx)=>{const rows=court.length?court.map((p,i)=>{const isCaptain=captainByCourt[idx]===p.key;return `<div class="player ${isCaptain?'captain':''}"><span class="rank">${i+1}</span><span class="player-name" title="${escapeHtml(p.name)}">${escapeHtml(p.name)}</span>${isCaptain?'<span class="captain-badge">队长</span>':''}</div>`}).join(''):'<div class="empty">暂无人员</div>';return `<article class="court"><div class="court-head"><span class="court-name">Court ${idx+1}</span><span class="count-pill">${court.length} 人</span></div><div class="player-list">${rows}</div></article>`}).join('')}
function copyCourtText(){const text=courts.map((court,idx)=>{const lines=court.length?court.map((p,i)=>`${i+1}. ${p.name}${captainByCourt[idx]===p.key?' ⭐队长':''}`).join('\n'):'暂无人员';return `Court ${idx+1}（${court.length}人）\n${lines}`}).join('\n\n');const finalText=`🎾 Dove Cup ${courtCount}个场地分组表\n共 ${players.length} 人\n\n${text}`;if(navigator.clipboard)navigator.clipboard.writeText(finalText).catch(()=>{});const output=document.getElementById('copyOutput');output.textContent=finalText;output.style.display='block'}
function toggleManualBox(){if(!requireAdmin())return;const box=document.getElementById('manualBox');box.style.display=box.style.display==='block'?'none':'block'}
function useManualNames(){if(!requireAdmin())return;const raw=document.getElementById('manualNames').value.trim();if(!raw)return;usingManual=true;players=raw.split('\n').map(x=>x.trim()).filter(Boolean).map((name,i)=>({key:`manual-${i}-${name}`,name}));document.getElementById('eventTitle').textContent='手动名单 · 本地随机分组';document.getElementById('syncStatus').textContent='手动模式';buildRandomCourts(true)}
function clearManualNames(){if(!requireAdmin())return;document.getElementById('manualNames').value=''}
function showError(message){document.getElementById('loading').style.display='none';const error=document.getElementById('error');error.textContent=message;error.style.display='block';document.getElementById('syncStatus').textContent='读取失败';if(isAdminMode)document.getElementById('manualBox').style.display='block'}
function applyRemoteState(data){if(usingManual)return;const state=data&&data.state?data.state:{};const joined=Array.isArray(state.joined)?state.joined:[];players=joined.filter(p=>p&&p.name).map((p,i)=>({key:String(p.id??`${p.name}-${i}`),name:p.name}));document.getElementById('eventTitle').textContent=state.title?`${state.title} · 自动读取报名名单`:'自动读取报名名单';document.getElementById('syncStatus').textContent=`已同步 ${players.length} 人`;applySavedLayout()}
async function fetchJson(path,signal){const url=`${FIREBASE_CONFIG.databaseURL.replace(/\/$/,'')}/${path}.json`;const res=await fetch(url,{signal,cache:'no-store'});if(!res.ok)throw new Error(`HTTP ${res.status}`);return res.json()}
async function fetchRealtimeDataOnce(){const controller=new AbortController();const timer=setTimeout(()=>controller.abort(),4000);try{const data=await Promise.all([fetchJson(DB_PATH,controller.signal),fetchJson(COURTS_DB_PATH,controller.signal)]);savedLayout=data[1]||null;courtCount=Number(savedLayout&&savedLayout.courtCount)||courtCount;applyRemoteState(data[0]);return true}finally{clearTimeout(timer)}}
function startFirebaseLiveSync(){try{if(!window.firebase||!firebase.database)return;if(!firebase.apps.length)firebase.initializeApp(FIREBASE_CONFIG);firebase.database().ref(DB_PATH).on('value',snapshot=>{applyRemoteState(snapshot.val())});remoteCourtsRef=firebase.database().ref(COURTS_DB_PATH);remoteCourtsRef.on('value',snapshot=>{savedLayout=snapshot.val()||null;courtCount=Number(savedLayout&&savedLayout.courtCount)||courtCount;if(!usingManual)applySavedLayout()})}catch(e){}}
async function loadRealtimeData(){try{const ok=await fetchRealtimeDataOnce();if(ok)startFirebaseLiveSync()}catch(e){showError('读取接龙数据失败。管理员可以点“手动输入名单”直接生成分组。')}}
renderAdmin();loadRealtimeData();
</script>
</body>
</html>
