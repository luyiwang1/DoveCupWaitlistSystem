*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}body{font-family:'Noto Sans SC',-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--gray-100);color:var(--ink);min-height:100dvh;padding:18px}.page{max-width:1280px;margin:0 auto}.hero{background:linear-gradient(135deg,#07C160 0%,#00D56A 62%,#10AEFF 140%);color:#fff;border-radius:24px;padding:24px;box-shadow:0 16px 44px rgba(7,193,96,.22);margin-bottom:16px}.hero-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap}h1{font-size:clamp(26px,4vw,42px);line-height:1.1;font-weight:900}.subtitle{margin-top:10px;font-size:14px;opacity:.92;line-height:1.6}.status-pill{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.34);border-radius:999px;padding:8px 13px;font-size:13px;font-weight:800;white-space:nowrap}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:22px}.admin-control{display:none}body.is-admin .admin-control{display:inline-flex}.btn,.small-btn{font-family:inherit;border:0;cursor:pointer;transition:transform .12s ease}.btn:active,.small-btn:active{transform:scale(.97)}.btn{border-radius:999px;padding:11px 16px;font-size:14px;font-weight:900;background:#fff;color:var(--green-dark);box-shadow:0 4px 16px rgba(0,0,0,.1)}.btn.secondary{color:#fff;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.38);box-shadow:none}.btn.dark{color:#fff;background:rgba(0,0,0,.18);border:1px solid rgba(255,255,255,.22);box-shadow:none}.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:16px}.stat-card{background:#fff;border-radius:18px;padding:16px;box-shadow:var(--shadow-soft);border:1px solid rgba(0,0,0,.03)}.stat-card .num{font-size:28px;font-weight:900;color:var(--green)}.stat-card .label{color:var(--gray-500);font-size:12px;margin-top:4px;font-weight:700}.panel{background:#fff;border-radius:20px;padding:14px;box-shadow:var(--shadow);margin-bottom:16px}.notice{display:flex;align-items:flex-start;gap:10px;color:var(--gray-700);font-size:13px;line-height:1.6}.admin-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:12px}.admin-row input{width:88px;border:1.5px solid var(--gray-300);border-radius:12px;padding:9px 10px;font:inherit;font-weight:800;text-align:center}.small-btn{border-radius:12px;padding:9px 12px;font-size:13px;font-weight:900;background:var(--green);color:#fff}.small-btn.light{background:var(--gray-200);color:var(--gray-700)}.small-btn.blue{background:var(--blue)}.small-btn.red{background:var(--red)}.round{margin-bottom:18px}.round-title{font-size:18px;font-weight:900;margin:18px 2px 10px;display:flex;align-items:center;gap:10px}.round-title span{font-size:12px;color:var(--gray-500);font-weight:700}.match-grid{display:grid;grid-template-columns:repeat(var(--court-count,5),minmax(220px,1fr));gap:12px}.match{background:#fff;border-radius:18px;border:1px solid var(--gray-200);box-shadow:var(--shadow-soft);overflow:hidden}.match-head{display:flex;justify-content:space-between;align-items:center;gap:10px;background:linear-gradient(135deg,var(--green-light),#F5FFF8);padding:12px 14px;border-bottom:1px solid var(--gray-200)}.court-name{font-weight:900;color:var(--green-dark)}.move-note{font-size:11px;color:var(--gray-500);font-weight:800}.team{padding:12px 14px;border-bottom:1px solid var(--gray-200)}.team:last-child{border-bottom:0}.team-label{display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:12px;font-weight:900;color:var(--gray-500);margin-bottom:8px}.team.win .team-label{color:var(--green-dark)}.team.lose .team-label{color:var(--red)}.players{display:flex;flex-wrap:wrap;gap:6px}.player-chip{display:inline-flex;align-items:center;border-radius:999px;background:var(--gray-100);padding:6px 9px;font-size:12px;font-weight:800;color:var(--gray-700)}.score-box{display:flex;align-items:center;gap:6px}.score-box input{width:54px;border:1.5px solid var(--gray-300);border-radius:10px;padding:7px 8px;font:inherit;text-align:center;font-weight:900}.score-box input:disabled{background:var(--gray-100);color:var(--gray-500)}.empty,.loading,.error{text-align:center;color:var(--gray-500);font-size:13px;line-height:1.6;padding:24px}.loading,.error{background:#fff;border-radius:18px;box-shadow:var(--shadow-soft)}.error{color:var(--red)}.table-wrap{overflow:auto;border-radius:16px;border:1px solid var(--gray-200);background:#fff}table{width:100%;border-collapse:collapse;min-width:860px}th,td{padding:12px 14px;text-align:left;border-bottom:1px solid var(--gray-200);font-size:13px;vertical-align:top}th{font-size:12px;color:var(--gray-500);background:var(--gray-50);text-transform:uppercase;letter-spacing:.04em}.manual-box{display:none;margin-top:12px;background:#fff;border:1px solid var(--gray-200);border-radius:18px;padding:14px}textarea{width:100%;min-height:150px;resize:vertical;border:1.5px solid var(--gray-300);border-radius:14px;padding:12px;font-family:inherit;font-size:14px;outline:none;line-height:1.5}.manual-actions{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap}.copy-output{display:none;margin-top:16px;white-space:pre-wrap;background:#111827;color:#fff;border-radius:18px;padding:16px;font-size:13px;line-height:1.65;box-shadow:var(--shadow)}
.player-chip.captain{background:var(--orange-light);color:var(--orange);border:1px solid var(--orange)}body.is-admin .round:first-child .player-chip{cursor:grab}body.is-admin .round:first-child .player-chip:active{cursor:grabbing}.players.drop-target{min-height:34px;border-radius:12px}body.is-admin .round:first-child .players.drop-target{outline:1px dashed var(--gray-300);outline-offset:3px}body.is-admin .round:first-child .players.drop-target.drag-over{background:var(--green-light);outline-color:var(--green)}.drag-hint{display:none;margin-left:auto;font-size:11px;color:var(--green-dark);font-weight:900}body.is-admin .round:first-child .drag-hint{display:inline}.division-title{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:8px 0 10px;font-size:15px;font-weight:900;color:var(--green-dark)}.division-title span{font-size:12px;color:var(--gray-500);font-weight:800}.division-pill{display:inline-flex;border-radius:999px;padding:5px 9px;background:var(--green-light);color:var(--green-dark);font-size:12px;font-weight:900}.match-head{position:relative}.court-index{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;background:var(--green);color:#fff;margin-right:7px;font-size:12px}.match-teams{display:grid;grid-template-columns:1fr 1fr;gap:0}.match-teams .team:first-child{border-right:1px solid var(--gray-200)}.score-team{background:var(--gray-50)}.score-label{font-size:12px;font-weight:900;color:var(--gray-500)}.summary-player{display:block;font-weight:800;color:var(--gray-700);line-height:1.55}.summary-player.captain{color:var(--orange)}.summary-move{display:inline-flex;border-radius:999px;padding:5px 8px;font-size:12px;font-weight:900}.summary-move.up{background:var(--green-light);color:var(--green-dark)}.summary-move.down{background:#FFEFEF;color:var(--red)}
@media(max-width:980px){.match-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.stats{grid-template-columns:repeat(2,minmax(0,1fr))}}@media(max-width:620px){body{padding:12px}.hero{border-radius:20px;padding:18px}.match-grid{grid-template-columns:1fr}.match-teams{grid-template-columns:1fr}.match-teams .team:first-child{border-right:0}.stats{grid-template-columns:repeat(2,minmax(0,1fr))}.btn{width:100%}}@media print{body{background:#fff;padding:8px}.hero,.panel,.stat-card,.match{box-shadow:none}.actions,.notice,.manual-box,.copy-output,.admin-control{display:none!important}.match-grid{grid-template-columns:repeat(var(--court-count,5),1fr);gap:8px}.match{break-inside:avoid}.hero{color:#111;background:#fff;border:1px solid #ddd}}
</style>

<body>
<main class="page">
  <section class="hero">
    <div class="hero-top">
      <div>
        <h1>🎾 Dove Cup<br>三轮升降级赛程</h1>
        <p class="subtitle" id="eventTitle">正在读取接龙报名名单...</p>
      </div>
      <div class="status-pill" id="syncStatus">实时同步中</div>
    </div>
    <div class="actions">
      <button class="btn" id="adminBtn" onclick="toggleAdmin()">Admin</button>
      <button class="btn admin-control" onclick="reshuffle()">🎲 重新生成首轮</button>
      <button class="btn secondary admin-control" onclick="saveAll()">💾 保存赛程和比分</button>
      <button class="btn secondary admin-control" onclick="syncScores(false)">🏆 手动同步积分榜</button>
      <button class="btn secondary" onclick="copyCourtText()">📋 复制三轮表格</button>
      <button class="btn secondary" onclick="goPage('index.html')">报名页</button>
      <button class="btn secondary" onclick="goPage('scores.html')">🏆 积分榜</button>
      <button class="btn dark admin-control" onclick="toggleManualBox()">✍️ 手动输入名单</button>
    </div>
  </section>
  <section class="stats">
    <div class="stat-card"><div class="num" id="totalPlayers">0</div><div class="label">报名人数</div></div>
    <div class="stat-card"><div class="num" id="courtCountStat">5</div><div class="label">场地数</div></div>
    <div class="stat-card"><div class="num">3</div><div class="label">轮数</div></div>
    <div class="stat-card"><div class="num" id="scoredMatches">0</div><div class="label">已录比分</div></div>
  </section>
  <section class="panel">
    <div class="notice"><span>💡</span><span>第 1 轮就是首轮位置，直接看自己在哪个 Court。每轮打完录入比分后，系统会自动生成下一轮；详细升降级去向在底部总表里。</span></div>
    <div class="admin-row admin-control">
      <label for="courtCountInput">场地数量</label>
      <input id="courtCountInput" type="number" min="1" max="20" value="5">
      <button class="small-btn" onclick="saveCourtCount()">保存场地数</button>
      <button class="small-btn light" onclick="clearScores()">清空三轮比分</button>
    </div>
    <div class="manual-box" id="manualBox">
      <textarea id="manualNames" placeholder="每行一个名字，例如：&#10;Luyi&#10;Alex&#10;Kevin&#10;May"></textarea>
      <div class="manual-actions">
        <button class="small-btn" onclick="useManualNames()">使用这份名单生成赛程</button>
        <button class="small-btn light" onclick="clearManualNames()">清空</button>
      </div>
    </div>
  </section>
  <section id="loading" class="loading">正在快速读取接龙名单...</section>
  <section id="error" class="error" style="display:none"></section>
  <section id="roundsPanel" style="display:none"></section>
  <section class="panel" id="summaryPanel" style="display:none">
    <div class="round-title">三轮总表 <span>方便截图/打印</span></div>
    <div class="table-wrap"><table><thead><tr><th>轮次</th><th>分级</th><th>场地</th><th>A 队</th><th>B 队</th><th>比分</th><th>胜方去向</th><th>负方去向</th></tr></thead><tbody id="summaryRows"></tbody></table></div>
  </section>
  <pre id="copyOutput" class="copy-output"></pre>
</main>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-database-compat.js"></script>
<script>
const ADMIN_PASSWORD='8888';
const ADMIN_STORAGE='courts_is_admin';
const SITE_VERSION='30';
const DB_PATH='doveCupWaitlistSystem/main';
const COURTS_DB_PATH='doveCupWaitlistSystem/courtsPage';
const SCORE_DB_PATH='doveCupWaitlistSystem/scores';
const FIREBASE_CONFIG={apiKey:'AIzaSyBPTwRAkfHjCA_RCQu5t2udzllF3Rz_CCo',authDomain:'dovecupdatabase.firebaseapp.com',databaseURL:'https://dovecupdatabase-default-rtdb.firebaseio.com/',projectId:'dovecupdatabase',storageBucket:'dovecupdatabase.firebasestorage.app',messagingSenderId:'814970094950',appId:'1:814970094950:web:c061c00eaceed40125b4a7'};
let courtCount=5,players=[],baseCourts=[],rounds=[],roundScores={},savedLayout=null,divisionRanges=[],remoteCourtsRef=null,scoreRef=null,scoreData={players:{},events:[]},usingManual=false,isAdminMode=sessionStorage.getItem(ADMIN_STORAGE)==='1',scoreSyncTimer=null;
function goPage(page){location.href=`${page}?v=${SITE_VERSION}`}
if(new URLSearchParams(location.search).get('v')!==SITE_VERSION){history.replaceState(null,'',`${location.pathname}?v=${SITE_VERSION}`)}
function renderAdmin(){document.body.classList.toggle('is-admin',isAdminMode);const btn=document.getElementById('adminBtn');if(btn)btn.textContent=isAdminMode?'Admin 已登录':'Admin';if(!isAdminMode)document.getElementById('manualBox').style.display='none'}
function toggleAdmin(){if(isAdminMode){isAdminMode=false;sessionStorage.removeItem(ADMIN_STORAGE);renderAdmin();render();return}const pass=prompt('请输入管理员密码');if(pass===ADMIN_PASSWORD){isAdminMode=true;sessionStorage.setItem(ADMIN_STORAGE,'1');renderAdmin();render()}else if(pass!==null){alert('密码错误')}}
function requireAdmin(){if(isAdminMode)return true;alert('只有管理员可以修改赛程');return false}
function escapeHtml(v){return String(v).replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]))}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function playerNames(list){return list.length?list.map(p=>p.name).join(' / '):'—'}
function scoreKey(round,court){return `${round}-${court}`}
function scoreFor(round,court){return roundScores[scoreKey(round,court)]||{}}
function hasScore(score){return Number.isFinite(Number(score.a))&&Number.isFinite(Number(score.b))}
function pickCaptain(teamA,teamB,round,court){const all=teamA.concat(teamB);return all.length?all[(round+court)%all.length].key:null}
function makeMatchFromPlayers(list,idx,round=0){const clean=list.filter(Boolean);const teamA=[];const teamB=[];clean.forEach((p,i)=>{if(clean.length>=4){(i===0||i===3?teamA:teamB).push(p)}else{(i%2===0?teamA:teamB).push(p)}});return{court:idx,teamA,teamB,captainKey:pickCaptain(teamA,teamB,round,idx)}}
function levelLabel(level){return level==='over3'?'3.0 以上':level==='under3'?'3.0 以下':'未分级'}
function levelOrder(level){return level==='over3'?0:level==='under3'?1:2}
function rebuildDivisionRanges(groups,allocations){divisionRanges=[];let start=0;groups.forEach(g=>{const count=allocations[g.level]||0;if(!count)return;divisionRanges.push({level:g.level,label:levelLabel(g.level),start,end:start+count-1,players:g.players.length});start+=count});courtCount=Math.max(1,start)}
function allocateDivisionCourts(groups,total){const allocations={};if(!groups.length)return allocations;groups.forEach(g=>allocations[g.level]=1);let left=Math.max(groups.length,total)-groups.length;const sorted=[...groups].sort((a,b)=>b.players.length-a.players.length);while(left>0){sorted[(left-1)%sorted.length].level&&(allocations[sorted[(left-1)%sorted.length].level]++);left--}return allocations}
function splitInitialCourts(list){const groups=Object.values(list.reduce((acc,p)=>{const level=p.levelGroup||'open';(acc[level]=acc[level]||{level,players:[]}).players.push(p);return acc},{})).sort((a,b)=>levelOrder(a.level)-levelOrder(b.level));const allocations=allocateDivisionCourts(groups,Number(courtCount)||groups.length||1);rebuildDivisionRanges(groups,allocations);const result=[];groups.forEach(g=>{const count=allocations[g.level]||1;const courts=Array.from({length:count},()=>[]);g.players.forEach((p,i)=>courts[i%count].push(p));result.push(...courts)});return result}
function normalizeLayout(layout){savedLayout=layout||{};courtCount=Number(savedLayout.courtCount)||courtCount;roundScores=savedLayout.roundScores&&typeof savedLayout.roundScores==='object'?savedLayout.roundScores:{}}
function applySavedLayout(){baseCourts=splitInitialCourts(players);buildRounds();render()}
function divisionForCourt(idx){return divisionRanges.find(d=>idx>=d.start&&idx<=d.end)||{start:0,end:courtCount-1,label:'全部',level:'open',players:players.length}}
function buildRounds(){rounds=[];let current=baseCourts.map((c,idx)=>makeMatchFromPlayers(c,idx,0));for(let r=0;r<3;r++){current=current.map((m,idx)=>Object.assign({},m,{captainKey:pickCaptain(m.teamA,m.teamB,r,idx)}));rounds.push(current);if(r===2)break;const buckets=Array.from({length:courtCount},()=>({a:[],b:[]}));current.forEach((match,idx)=>{const s=scoreFor(r,idx);let win=match.teamA,lose=match.teamB;if(hasScore(s)&&Number(s.b)>Number(s.a)){win=match.teamB;lose=match.teamA}const d=divisionForCourt(idx);const up=Math.max(d.start,idx-1);const down=Math.min(d.end,idx+1);addSplitPair(buckets[up],win);addSplitPair(buckets[down],lose)});current=buckets.map((bucket,idx)=>({court:idx,teamA:bucket.a,teamB:bucket.b,captainKey:pickCaptain(bucket.a,bucket.b,r+1,idx)}))}}
function addSplitPair(bucket,team){team.forEach((p,i)=>{(i%2===0?bucket.a:bucket.b).push(p)})}
function buildPayload(){return{courtCount,courts:baseCourts.map(c=>c.map(p=>p.key)),roundScores,updatedAt:Date.now()}}
function saveLayout(){savedLayout=buildPayload();if(remoteCourtsRef)remoteCourtsRef.set(savedLayout).catch(()=>alert('赛程保存失败，请检查网络'))}
function reshuffle(){if(!requireAdmin())return;baseCourts=splitInitialCourts(shuffle(players));roundScores={};buildRounds();saveLayout();render()}
function saveAll(){if(!requireAdmin())return;saveLayout();alert('赛程和比分已保存')}
function saveCourtCount(){if(!requireAdmin())return;const val=parseInt(document.getElementById('courtCountInput').value,10);if(!Number.isFinite(val)||val<1||val>20){alert('请输入 1-20 的场地数量');return}courtCount=val;baseCourts=splitInitialCourts(shuffle(players));roundScores={};buildRounds();saveLayout();render()}
function clearScores(){if(!requireAdmin())return;if(!confirm('确定清空三轮比分吗？'))return;roundScores={};buildRounds();saveLayout();scheduleScoreSync();render()}
function onScoreInput(el){if(!isAdminMode)return;const key=scoreKey(el.dataset.round,el.dataset.court);roundScores[key]=roundScores[key]||{};roundScores[key][el.dataset.side]=el.value===''?'':Number(el.value);buildRounds();saveLayout();scheduleScoreSync();render()}
function dragPlayer(event,key){if(!isAdminMode){event.preventDefault();return}event.dataTransfer.setData('text/plain',key);event.dataTransfer.effectAllowed='move'}
function allowPlayerDrop(event){if(!isAdminMode)return;event.preventDefault();event.currentTarget.classList.add('drag-over')}
function leavePlayerDrop(event){event.currentTarget.classList.remove('drag-over')}
function dropPlayer(event,courtIdx){if(!isAdminMode)return;event.preventDefault();event.currentTarget.classList.remove('drag-over');const key=event.dataTransfer.getData('text/plain');if(!key)return;let moving=null,fromIdx=-1;baseCourts=baseCourts.map((court,idx)=>court.filter(p=>{if(p.key===key){moving=p;fromIdx=idx;return false}return true}));if(!moving)return;const fromDivision=divisionForCourt(fromIdx),toDivision=divisionForCourt(courtIdx);if(fromDivision.level!==toDivision.level){alert('只能在同一个分级里调整场地');baseCourts[fromIdx].push(moving);render();return}baseCourts[courtIdx]=baseCourts[courtIdx]||[];baseCourts[courtIdx].push(moving);roundScores={};buildRounds();saveLayout();render()}
function render(){document.documentElement.style.setProperty('--court-count',Math.min(courtCount,6));document.getElementById('loading').style.display='none';document.getElementById('error').style.display='none';document.getElementById('roundsPanel').style.display='block';document.getElementById('summaryPanel').style.display='block';document.getElementById('courtCountInput').value=courtCount;document.getElementById('courtCountStat').textContent=courtCount;document.getElementById('totalPlayers').textContent=players.length;document.getElementById('scoredMatches').textContent=Object.values(roundScores).filter(hasScore).length;document.getElementById('roundsPanel').innerHTML=rounds.map((round,r)=>`<section class="round"><div class="round-title">第 ${r+1} 轮 <span>${roundSubtitle(r)}</span></div><div class="match-grid">${round.map((m,idx)=>matchHtml(m,r,idx)).join('')}</div></section>`).join('');document.getElementById('summaryRows').innerHTML=rounds.flatMap((round,r)=>round.map((m,idx)=>summaryRow(m,r,idx))).join('')}
function roundSubtitle(r){return r===0?'首轮按当前报名名单分组':`第 ${r} 轮结果决定本轮场地`}
function matchHtml(m,r,idx){const s=scoreFor(r,idx);const a=Number(s.a),b=Number(s.b);const scored=hasScore(s);const aWin=scored&&a>=b,bWin=scored&&b>a;return`<article class="match"><div class="match-head"><span class="court-name"><span class="court-index">${idx+1}</span>Court ${idx+1}</span>${r===0?'<span class="drag-hint">Admin 可拖拽调整</span>':''}</div><div class="match-teams">${teamHtml('A 队',m.teamA,aWin,bWin,m.captainKey,r,idx)}${teamHtml('B 队',m.teamB,bWin,aWin,m.captainKey,r,idx)}</div><div class="team score-team"><div class="team-label"><span class="score-label">比分</span><span class="score-box"><input ${isAdminMode?'':'disabled'} data-round="${r}" data-court="${idx}" data-side="a" value="${s.a??''}" oninput="onScoreInput(this)"> : <input ${isAdminMode?'':'disabled'} data-round="${r}" data-court="${idx}" data-side="b" value="${s.b??''}" oninput="onScoreInput(this)"></span></div></div></article>`}
function teamHtml(label,list,isWin,isLose,captainKey,round,courtIdx){const d=round===0?` ondragover="allowPlayerDrop(event)" ondragleave="leavePlayerDrop(event)" ondrop="dropPlayer(event,${courtIdx})"`:'';const teamClass=isWin?'win':isLose?'lose':'';return`<div class="team ${teamClass}"><div class="team-label"><span>${label}</span><span>${isWin?'胜方 ↑':isLose?'负方 ↓':''}</span></div><div class="players drop-target"${d}>${list.length?list.map(p=>`<span class="player-chip ${p.key===captainKey?'captain':''}" data-key="${escapeHtml(p.key)}" ${round===0&&isAdminMode?'draggable="true" ondragstart="dragPlayer(event,this.dataset.key)"':''}>${escapeHtml(p.name)}${p.key===captainKey?' · \u961f\u957f':''}</span>`).join(''):'<span class="player-chip">空位</span>'}</div></div>`}
function summaryRow(m,r,idx){const s=scoreFor(r,idx);const score=hasScore(s)?`${s.a} : ${s.b}`:'未录入';return`<tr><td>第 ${r+1} 轮</td><td>Court ${idx+1}</td><td>${summaryPlayers(m.teamA,m.captainKey)}</td><td>${summaryPlayers(m.teamB,m.captainKey)}</td><td>${score}</td><td><span class="summary-move up">Court ${winnerCourt(idx)}</span></td><td><span class="summary-move down">Court ${loserCourt(idx)}</span></td></tr>`}
function render(){document.documentElement.style.setProperty('--court-count',Math.min(courtCount,6));document.getElementById('loading').style.display='none';document.getElementById('error').style.display='none';document.getElementById('roundsPanel').style.display='block';document.getElementById('summaryPanel').style.display='block';document.getElementById('courtCountInput').value=courtCount;document.getElementById('courtCountStat').textContent=courtCount;document.getElementById('totalPlayers').textContent=players.length;document.getElementById('scoredMatches').textContent=Object.values(roundScores).filter(hasScore).length;document.getElementById('roundsPanel').innerHTML=rounds.map((round,r)=>`<section class="round"><div class="round-title">第 ${r+1} 轮 <span>${roundSubtitle(r)}</span></div>${renderRoundDivisions(round,r)}</section>`).join('');document.getElementById('summaryRows').innerHTML=rounds.flatMap((round,r)=>round.map((m,idx)=>summaryRow(m,r,idx))).join('')}
function renderRoundDivisions(round,r){const ranges=divisionRanges.length?divisionRanges:[{start:0,end:round.length-1,label:'全部',players:players.length}];return ranges.map(d=>`<div class="division-title"><strong>${d.label}</strong><span>${d.players} 人 · Court ${d.start+1}-${d.end+1}</span></div><div class="match-grid">${round.slice(d.start,d.end+1).map((m,offset)=>matchHtml(m,r,d.start+offset)).join('')}</div>`).join('')}
function roundSubtitle(r){return r===0?'首轮按当前报名名单分组':`第 ${r} 轮结果决定本轮场地`}
function matchHtml(m,r,idx){const s=scoreFor(r,idx);const a=Number(s.a),b=Number(s.b);const scored=hasScore(s);const aWin=scored&&a>=b,bWin=scored&&b>a;return`<article class="match"><div class="match-head"><span class="court-name"><span class="court-index">${idx+1}</span>Court ${idx+1}</span>${r===0?'<span class="drag-hint">Admin 可拖拽调整</span>':''}</div><div class="match-teams">${teamHtml('A 队',m.teamA,aWin,bWin,m.captainKey,r,idx)}${teamHtml('B 队',m.teamB,bWin,aWin,m.captainKey,r,idx)}</div><div class="team score-team"><div class="team-label"><span class="score-label">比分</span><span class="score-box"><input ${isAdminMode?'':'disabled'} data-round="${r}" data-court="${idx}" data-side="a" value="${s.a??''}" oninput="onScoreInput(this)"> : <input ${isAdminMode?'':'disabled'} data-round="${r}" data-court="${idx}" data-side="b" value="${s.b??''}" oninput="onScoreInput(this)"></span></div></div></article>`}
function teamHtml(label,list,isWin,isLose,captainKey,round,courtIdx){const d=round===0?` ondragover="allowPlayerDrop(event)" ondragleave="leavePlayerDrop(event)" ondrop="dropPlayer(event,${courtIdx})"`:'';const teamClass=isWin?'win':isLose?'lose':'';return`<div class="team ${teamClass}"><div class="team-label"><span>${label}</span><span>${isWin?'胜方 ↑':isLose?'负方 ↓':''}</span></div><div class="players drop-target"${d}>${list.length?list.map(p=>`<span class="player-chip ${p.key===captainKey?'captain':''}" data-key="${escapeHtml(p.key)}" ${round===0&&isAdminMode?'draggable="true" ondragstart="dragPlayer(event,this.dataset.key)"':''}>${escapeHtml(p.name)}${p.key===captainKey?' · \u961f\u957f':''}</span>`).join(''):'<span class="player-chip">空位</span>'}</div></div>`}
function summaryRow(m,r,idx){const s=scoreFor(r,idx);const score=hasScore(s)?`${s.a} : ${s.b}`:'未录入';const d=divisionForCourt(idx);return`<tr><td>第 ${r+1} 轮</td><td><span class="division-pill">${d.label}</span></td><td>Court ${idx+1}</td><td>${summaryPlayers(m.teamA,m.captainKey)}</td><td>${summaryPlayers(m.teamB,m.captainKey)}</td><td>${score}</td><td><span class="summary-move up">Court ${winnerCourt(idx)}</span></td><td><span class="summary-move down">Court ${loserCourt(idx)}</span></td></tr>`}
function summaryPlayers(list,captainKey){return list.length?list.map(p=>`<span class="summary-player ${p.key===captainKey?'captain':''}">${escapeHtml(p.name)}${p.key===captainKey?' · \u961f\u957f':''}</span>`).join(''):'<span class="summary-player">空位</span>'}
function winnerCourt(idx){const d=divisionForCourt(idx);return Math.max(d.start+1,idx)}
function loserCourt(idx){const d=divisionForCourt(idx);return Math.min(d.end+1,idx+2)}
function moveText(idx){return`胜方→Court ${winnerCourt(idx)}，负方→Court ${loserCourt(idx)}`}
function computeCourtWins(){const totals={};rounds.forEach((round,r)=>round.forEach((m,idx)=>{const s=scoreFor(r,idx);if(!hasScore(s))return;m.teamA.forEach(p=>totals[p.key]=(totals[p.key]||0)+Number(s.a));m.teamB.forEach(p=>totals[p.key]=(totals[p.key]||0)+Number(s.b))}));return totals}
function normalizeScoreData(data){const next=data||{};next.players=next.players&&typeof next.players==='object'?next.players:{};next.events=Array.isArray(next.events)?next.events:[];return next}
function scoreKeyForName(name){return name.trim().toLowerCase().replace(/[.#$/[\]]/g,'_')}
function scheduleScoreSync(){clearTimeout(scoreSyncTimer);scoreSyncTimer=setTimeout(()=>syncScores(true),500)}
function syncScores(silent=false){if(!isAdminMode&&!silent)return;if(!scoreRef)return;const courtWins=computeCourtWins();players.forEach(p=>{const key=scoreKeyForName(p.name);const existing=scoreData.players[key]||{key,name:p.name,appearances:0,wins:0,points:0};const manualWins=Number(existing.manualWins ?? (Number(existing.wins||0)-Number(existing.courtWins||0)))||0;const wins=Number(courtWins[p.key]||0);existing.name=p.name;existing.manualWins=manualWins;existing.courtWins=wins;existing.wins=manualWins+wins;existing.points=Number(existing.appearances||0)*50+existing.wins*10;existing.updatedAt=Date.now();scoreData.players[key]=existing});scoreData.events=Array.isArray(scoreData.events)?scoreData.events:[];scoreData.events.unshift({type:'courtScores',winsByPlayer:courtWins,ts:Date.now(),silent});scoreData.events=scoreData.events.slice(0,20);scoreRef.set(Object.assign({},scoreData,{updatedAt:Date.now()})).then(()=>{if(!silent)alert('比分已同步到积分榜')}).catch(()=>{if(!silent)alert('积分同步失败，请检查网络')})}
function copyCourtText(){const lines=rounds.flatMap((round,r)=>[`第 ${r+1} 轮`,...round.map((m,idx)=>{const s=scoreFor(r,idx);const scoreText=hasScore(s)?`${s.a}:${s.b}`:'';return `Court ${idx+1}: A(${playerNames(m.teamA)}) vs B(${playerNames(m.teamB)}) ${scoreText}`}),'' ]);const text=lines.join('\n');if(navigator.clipboard)navigator.clipboard.writeText(text).catch(()=>{});const output=document.getElementById('copyOutput');output.textContent=text;output.style.display='block'}
function toggleManualBox(){if(!requireAdmin())return;const box=document.getElementById('manualBox');box.style.display=box.style.display==='block'?'none':'block'}
function useManualNames(){if(!requireAdmin())return;const raw=document.getElementById('manualNames').value.trim();if(!raw)return;usingManual=true;players=raw.split('\n').map(x=>x.trim()).filter(Boolean).map((name,i)=>({key:`manual-${i}-${name}`,name}));document.getElementById('eventTitle').textContent='手动名单 · 三轮升降级赛程';document.getElementById('syncStatus').textContent='手动模式';baseCourts=splitInitialCourts(players);roundScores={};buildRounds();saveLayout();render()}
function clearManualNames(){if(!requireAdmin())return;document.getElementById('manualNames').value=''}
function showError(message){document.getElementById('loading').style.display='none';const error=document.getElementById('error');error.textContent=message;error.style.display='block';document.getElementById('syncStatus').textContent='读取失败';if(isAdminMode)document.getElementById('manualBox').style.display='block'}
function applyRemoteState(data){if(usingManual)return;const state=data&&data.state?data.state:{};const joined=Array.isArray(state.joined)?state.joined:[];players=joined.filter(p=>p&&p.name).map((p,i)=>({key:String(p.id??`${p.name}-${i}`),name:p.name,levelGroup:p.levelGroup||'open'}));const levelCount=new Set(players.map(p=>p.levelGroup)).size||0;document.getElementById('eventTitle').textContent=state.title?`${state.title} · 自动读取报名名单`:'自动读取报名名单';document.getElementById('syncStatus').textContent=`已同步 ${players.length} 人 · ${levelCount} 个分级`;applySavedLayout()}
async function fetchJson(path,signal){const url=`${FIREBASE_CONFIG.databaseURL.replace(/\/$/,'')}/${path}.json`;const res=await fetch(url,{signal,cache:'no-store'});if(!res.ok)throw new Error(`HTTP ${res.status}`);return res.json()}
async function fetchRealtimeDataOnce(){const controller=new AbortController();const timer=setTimeout(()=>controller.abort(),4000);try{const data=await Promise.all([fetchJson(DB_PATH,controller.signal),fetchJson(COURTS_DB_PATH,controller.signal),fetchJson(SCORE_DB_PATH,controller.signal)]);normalizeLayout(data[1]);scoreData=normalizeScoreData(data[2]);applyRemoteState(data[0]);return true}finally{clearTimeout(timer)}}
function startFirebaseLiveSync(){try{if(!window.firebase||!firebase.database)return;if(!firebase.apps.length)firebase.initializeApp(FIREBASE_CONFIG);firebase.database().ref(DB_PATH).on('value',snapshot=>{applyRemoteState(snapshot.val())});remoteCourtsRef=firebase.database().ref(COURTS_DB_PATH);remoteCourtsRef.on('value',snapshot=>{normalizeLayout(snapshot.val());if(!usingManual)applySavedLayout()});scoreRef=firebase.database().ref(SCORE_DB_PATH);scoreRef.on('value',snapshot=>{scoreData=normalizeScoreData(snapshot.val())})}catch(e){}}
async function loadRealtimeData(){try{const ok=await fetchRealtimeDataOnce();if(ok)startFirebaseLiveSync()}catch(e){showError('读取接龙数据失败。管理员可以点“手动输入名单”直接生成赛程。')}}
renderAdmin();loadRealtimeData();
</script>
